# Lint, test, and synth on every push. The deploy job is wired but gated off
# until Phase 6 turns it on. Eval runs here starting in Phase 5.
name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # Recorded provider, so this is deterministic and free. Fails the build if
      # field accuracy drops below the threshold in eval/run.ts.
      - run: npm run eval
      - run: npm run synth

  deploy:
    # Only on a merge to main, and only after build (lint, test, eval, synth)
    # passes. The eval gate is therefore ahead of every deploy.
    #
    # Also opt in: set the repository variable AWS_DEPLOY to true once the CICD
    # stack exists and AWS_ACCOUNT_ID is set. Until then this job is skipped
    # rather than failing every push. Secrets cannot be read in a job level if,
    # so this gates on a variable.
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.AWS_DEPLOY == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    # Serialize deploys so two merges cannot deploy over each other. Do not cancel
    # a deploy in flight, let it finish and queue the next.
    concurrency:
      group: docket-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/docket-github-deploy
          aws-region: us-east-1
      # The alarm address is a repository variable, not source. If ALARM_EMAIL is
      # unset the context is empty, and the stack deploys with alarms that page
      # nobody rather than paging a placeholder.
      - name: cdk diff to the job summary
        run: |
          echo '## cdk diff' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npx cdk diff Docket --context docket:alarmEmail=${{ vars.ALARM_EMAIL }} 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - run: npx cdk deploy Docket --require-approval never --context docket:alarmEmail=${{ vars.ALARM_EMAIL }}
